name: PR Previews

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - dracor.odd

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      odd: ${{ steps.check.outputs.odd }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Check if dracor.odd changed
        id: check
        run: |
          if [ "${{ github.event.action }}" = "opened" ] || [ "${{ github.event.action }}" = "reopened" ]; then
            # Check all commits on the branch
            BASE=${{ github.event.pull_request.base.sha }}
          else
            # Check only the newly pushed commits
            BASE=${{ github.event.before }}
          fi
          if git diff --name-only ${BASE}..HEAD | grep -q '^dracor\.odd$'; then
            echo "odd=true" >> $GITHUB_OUTPUT
          else
            echo "odd=false" >> $GITHUB_OUTPUT
          fi
  build-and-deploy-preview:
    needs: check-changes
    if: needs.check-changes.outputs.odd == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - run: ./build
      - run: ls -l dist

      - uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.DRACOR_ORG_DEPLOY_KEY }}

      - name: Deploy to staging.dracor.org
        run: |
          scp -o StrictHostKeyChecking=no ./dist/odd*.html \
            ${{ secrets.DRACOR_ORG_DEPLOY_USER }}@staging.dracor.org:/var/www/html/previews/
          scp -o StrictHostKeyChecking=no ./dist/index.html \
            ${{ secrets.DRACOR_ORG_DEPLOY_USER }}@staging.dracor.org:/var/www/html/previews/odd-${{ github.event.number }}.html

      - name: Comment preview URL on PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const url = `https://staging.dracor.org/previews/odd-${{ github.event.number }}.html`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `**Preview available:** ${url}`
            });
